{% extends "base.html" %}
{% load static %}

{% block content %}

    {% if user.is_authenticated %}
    <form action="/messagecenter/sendMessage/{{ user_id }}" id="sendmessage" class="container" style="max-width: 350px; background-color: #FFFFFF; border-radius: 10px" method="post">{% csrf_token %}
        <h1 style="text-align: center">Message {{receiver.username}}</h1>
        <div class="form-group container">
            {{form.as_p}}
            <button type="submit" class="btn btn-primary btn-block">Send</button>
        </div>
        </form>
    {% else %}
        <h1 style="text-align: center">You must be logged in to submit this form</h1>
    {% endif %}

    <script type="text/javascript" src="{% static 'js/message-length-counter.js' %}"></script>
    <script type="text/javascript">
    (function() {
        if (window.ToolShareMessageCounter) {
            window.ToolShareMessageCounter.attach(document.getElementById("id_content"), {
                maxLength: {{ message_max_length }},
                focus: true
            });
        }
    })();
    </script>
    
{% endblock %}

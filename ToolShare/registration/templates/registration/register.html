{% extends "base.html" %}
{% block title %}Create an account{% endblock %}
{% block content %}
  
	<form action="/registration/" id="register" class="container " style="max-width: 350px; border-radius: 8px; background-color: #FFFFFF" method="post">{% csrf_token %}
	<h1 style="text-align: center">Register for an Account</h1>
		<div class="form-group container">
				{{form.as_p}}
 			<button type="submit" class="btn btn-primary btn-block">Create The Account</button>
		</div><br>
	</form>
    <script type="text/javascript">
    (function() {
        if (document.forms.register && document.forms.register.id_firstName) {
            document.forms.register.id_firstName.focus();
        }

        var zipInput = document.getElementById("id_zipcode");
        if (!zipInput) {
            return;
        }

        function normalizeZip() {
            var digitsOnly = zipInput.value.replace(/\D/g, "").substring(0, 5);
            zipInput.value = digitsOnly;
        }

        zipInput.addEventListener("input", normalizeZip);
        zipInput.addEventListener("paste", function() {
            window.setTimeout(normalizeZip, 0);
        });
    })();
    </script>

{% endblock %}
